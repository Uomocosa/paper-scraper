# pixi.toml
[workspace]
channels = ["pytorch", "nvidia", "conda-forge", "anaconda"]
platforms = ["win-64", "linux-64"]

[tasks]
scrape = "python -c 'from paper_scraper.main import main, Config; import tyro; config = tyro.cli(Config); main(config); main(config)'"
extract_references = "python -c 'from paper_scraper.pipeline import extract_refs; import tyro; config = tyro.cli(extract_refs.Config); extract_refs(config)'"
get_dois = "python -c 'from paper_scraper.pipeline import get_dois; import tyro; config = tyro.cli(get_dois.Config); get_dois(config)'"
download_papers = "python -c 'from paper_scraper.pipeline import download; import tyro; config = tyro.cli(download.Config); download(config)'"
analyze = "python -c 'from paper_scraper.pipeline import analyze; import tyro; config = tyro.cli(analyze.Config); analyze(config)'"
get_openalex_topics_codes = "python -c 'from paper_scraper import get_openalex_topics_codes; import tyro; config = tyro.cli(get_openalex_topics_codes.Config); get_openalex_topics_codes.main(config)'"

[dependencies]
python = ">=3.11"
requests = ">=2.33.1,<3"
beautifulsoup4 = ">=4.14.3,<5"
lxml = ">=6.0.2,<7"
python-dotenv = ">=1.2.2,<2"

[pypi-dependencies]
new-import-system = { git = "https://github.com/Uomocosa/new-python-import-system" }
lele = { git = "https://github.com/Uomocosa/lele-py" }
# mingpt = { git = "git+https://github.com/karpathy/minGPT" }
pytest = ">=9.0.2, <10"
loguru = ">=0.7.3, <0.8"
tyro = ">=1.0.9, <2"
pyalex = ">=0.21, <0.22"
joblib = ">=1.5.3, <2"
pypdf = ">=5.1.0, <6"
pyyaml = ">=6.0.2, <7"
pymupdf = ">=1.25.0,<2"
