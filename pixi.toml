# pixi.toml
[workspace]
channels = ["pytorch", "nvidia", "conda-forge", "anaconda"]
platforms = ["win-64", "linux-64"]

[tasks]
extract_refs = "python -c 'from paper_scraper.main import main, Config; main(Config(extract_refs_from_seed=True, extract_refs_from_output=False))'"
download_papers = "python -c 'from paper_scraper.main import main, Config; main(Config(extract_refs_from_seed=False, extract_refs_from_output=True))'"
analyze = "python -c 'from paper_scraper.main import main, Config; main(Config(questions=[\"What is this paper about?\"], extract_refs_from_seed=False))'"

[dependencies]
python = ">=3.11"
requests = ">=2.33.1,<3"
beautifulsoup4 = ">=4.14.3,<5"
lxml = ">=6.0.2,<7"
python-dotenv = ">=1.2.2,<2"

[pypi-dependencies]
new-import-system = { git = "https://github.com/Uomocosa/new-python-import-system" }
lele = { git = "https://github.com/Uomocosa/lele-py" }
# mingpt = { git = "git+https://github.com/karpathy/minGPT" }
pytest = ">=9.0.2, <10"
loguru = ">=0.7.3, <0.8"
tyro = ">=1.0.9, <2"
pyalex = ">=0.21, <0.22"
joblib = ">=1.5.3, <2"
pypdf = ">=5.1.0, <6"
pyyaml = ">=6.0.2, <7"
